<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cloud Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
    overflow: hidden;
    user-select: none;
  }

  /* ── Toolbar ── */
  #toolbar {
    background: #111118;
    border-bottom: 1px solid #1e1e2e;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    z-index: 10;
  }
  .tb-btn {
    background: #1a1a25;
    border: 1px solid #2a2a3a;
    color: #818cf8;
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .tb-btn:hover { background: #222235; }
  #url-bar {
    flex: 1;
    background: #0d0d14;
    border: 1px solid #1e1e2e;
    color: #e0e0e0;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    min-width: 0;
  }
  #url-bar:focus { border-color: #6366f1; }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ef4444;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.connected { background: #22c55e; }

  /* ── Canvas Area ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    cursor: default;
  }
  #screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    cursor: default;
  }
  #loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #4a4a5a;
    font-size: 13px;
  }
  .spinner {
    width: 30px; height: 30px;
    border: 2px solid #1e1e2e;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Keyboard (Mobile) ── */
  #kb-btn {
    position: fixed;
    bottom: 16px; right: 16px;
    width: 48px; height: 48px;
    background: #6366f1;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    z-index: 100;
  }
  #hidden-input {
    position: fixed;
    opacity: 0; pointer-events: none;
    top: 0; left: 0;
    width: 1px; height: 1px;
  }

  /* ── Save Session Toast ── */
  #toast {
    position: fixed;
    bottom: 70px; left: 50%;
    transform: translateX(-50%);
    background: #22c55e;
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
  }
  #toast.show { opacity: 1; }

  /* ── Title Bar ── */
  #title-bar {
    background: #0d0d14;
    border-bottom: 1px solid #1a1a25;
    padding: 4px 10px;
    font-size: 10px;
    color: #4a4a5a;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #page-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
  .save-btn {
    background: none;
    border: 1px solid #2a2a3a;
    color: #6366f1;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <div id="status-dot"></div>
  <button class="tb-btn" id="btn-back" title="Back">←</button>
  <button class="tb-btn" id="btn-fwd" title="Forward">→</button>
  <button class="tb-btn" id="btn-refresh" title="Refresh">↻</button>
  <input id="url-bar" type="text" placeholder="Enter URL or search..." value="https://www.google.com">
  <button class="tb-btn" id="btn-go" title="Go">↵</button>
</div>

<!-- Title Bar -->
<div id="title-bar">
  <span id="page-title">Loading...</span>
  <button class="save-btn" id="btn-save">💾 Save Session</button>
</div>

<!-- Canvas -->
<div id="canvas-wrap">
  <canvas id="screen"></canvas>
  <div id="loading">
    <div class="spinner"></div>
    Connecting to browser...
  </div>
</div>

<!-- Mobile keyboard button -->
<div id="kb-btn">⌨️</div>
<input id="hidden-input" type="text">

<!-- Toast -->
<div id="toast">Session Saved! ✓</div>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');
const urlBar = document.getElementById('url-bar');
const statusDot = document.getElementById('status-dot');
const pageTitle = document.getElementById('page-title');
const toast = document.getElementById('toast');
const canvasWrap = document.getElementById('canvas-wrap');

let ws = null;
let connected = false;
let browserW = 1280, browserH = 720;
let scale = 1;

// ── WebSocket ────────────────────────────

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    connected = true;
    statusDot.classList.add('connected');
    loading.style.display = 'none';
  };

  ws.onclose = () => {
    connected = false;
    statusDot.classList.remove('connected');
    setTimeout(connect, 3000); // auto-reconnect
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'frame') {
        drawFrame(msg.data);
        if (msg.url) urlBar.value = msg.url;
        if (msg.title) pageTitle.textContent = msg.title || msg.url;
      }
    } catch(err) {}
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ── Draw Frame ───────────────────────────

function drawFrame(b64) {
  const img = new Image();
  img.onload = () => {
    browserW = img.width;
    browserH = img.height;
    resizeCanvas();
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  };
  img.src = 'data:image/jpeg;base64,' + b64;
}

function resizeCanvas() {
  const w = canvasWrap.clientWidth;
  const h = canvasWrap.clientHeight;
  const ratio = Math.min(w / browserW, h / browserH);
  canvas.width = browserW * ratio;
  canvas.height = browserH * ratio;
  canvas.style.left = ((w - canvas.width) / 2) + 'px';
  canvas.style.top = ((h - canvas.height) / 2) + 'px';
  scale = ratio;
}

window.addEventListener('resize', resizeCanvas);

// ── Mouse Events ─────────────────────────

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: Math.round((clientX - rect.left) / scale),
    y: Math.round((clientY - rect.top) / scale)
  };
}

canvas.addEventListener('click', e => {
  const pos = getPos(e);
  send({ type: 'click', ...pos });
});

canvas.addEventListener('dblclick', e => {
  const pos = getPos(e);
  send({ type: 'dblclick', ...pos });
});

canvas.addEventListener('mousemove', e => {
  const pos = getPos(e);
  send({ type: 'mousemove', ...pos });
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const pos = getPos(e);
  send({ type: 'scroll', ...pos, dx: e.deltaX, dy: e.deltaY });
}, { passive: false });

// Touch
let lastTap = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = getPos(e);
  const now = Date.now();
  if (now - lastTap < 300) {
    send({ type: 'dblclick', ...pos });
  } else {
    send({ type: 'click', ...pos });
  }
  lastTap = now;
}, { passive: false });

// ── Keyboard ─────────────────────────────

document.addEventListener('keydown', e => {
  // Don't capture when typing in url bar
  if (document.activeElement === urlBar) return;

  const keyMap = {
    'Enter': 'Enter', 'Backspace': 'Backspace', 'Delete': 'Delete',
    'ArrowUp': 'ArrowUp', 'ArrowDown': 'ArrowDown',
    'ArrowLeft': 'ArrowLeft', 'ArrowRight': 'ArrowRight',
    'Tab': 'Tab', 'Escape': 'Escape', 'Home': 'Home', 'End': 'End',
    'PageUp': 'PageUp', 'PageDown': 'PageDown',
    'F5': 'F5', 'Control': 'Control', 'Shift': 'Shift', 'Alt': 'Alt'
  };

  if (keyMap[e.key]) {
    e.preventDefault();
    send({ type: 'keydown', key: keyMap[e.key] });
  } else if (e.ctrlKey) {
    send({ type: 'keydown', key: 'Control+' + e.key });
  } else if (e.key.length === 1) {
    send({ type: 'type', text: e.key });
  }
});

// ── Mobile Keyboard ──────────────────────

const kbBtn = document.getElementById('kb-btn');
const hiddenInput = document.getElementById('hidden-input');

kbBtn.addEventListener('click', () => {
  hiddenInput.focus();
});

hiddenInput.addEventListener('input', e => {
  const text = e.data;
  if (text) send({ type: 'type', text });
  hiddenInput.value = '';
});

hiddenInput.addEventListener('keydown', e => {
  if (e.key === 'Backspace') send({ type: 'keydown', key: 'Backspace' });
  if (e.key === 'Enter') send({ type: 'keydown', key: 'Enter' });
});

// ── Toolbar Controls ─────────────────────

document.getElementById('btn-back').onclick = () => send({ type: 'back' });
document.getElementById('btn-fwd').onclick = () => send({ type: 'forward' });
document.getElementById('btn-refresh').onclick = () => send({ type: 'refresh' });

document.getElementById('btn-go').onclick = navigate;
urlBar.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });

function navigate() {
  let url = urlBar.value.trim();
  if (!url) return;
  // If no dot or looks like search, use Google
  if (!url.includes('.') || url.includes(' ')) {
    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
  }
  send({ type: 'navigate', url });
}

// ── Save Session ─────────────────────────

document.getElementById('btn-save').onclick = async () => {
  send({ type: 'save_session' });
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
};

// ── Init ─────────────────────────────────
connect();
resizeCanvas();
</script>
</body>
</html>
